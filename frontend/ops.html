<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Operations - Allied Savings</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="admin">
    <header class="site-header auth-header">
      <div class="wrap header-main">
        <a class="brand" href="/" aria-label="Allied Savings home">
          <img src="/assets/logo-allied-savings.svg" alt="Allied Savings">
        </a>
      </div>
    </header>

    <main class="admin-page wrap">
      <section class="admin-login" id="adminLoginPanel">
        <p class="eyebrow">Back Office</p>
        <h1>Operations Centre</h1>
        <p class="form-note">Authorised staff only. All actions are recorded in the audit log.</p>
        <form id="adminLoginForm">
          <label>
            Operations password
            <input name="adminPassword" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary-button" type="submit">Sign In</button>
        </form>
        <p class="status" id="adminStatus"></p>
      </section>

      <section class="admin-dashboard is-hidden" id="adminDashboard">
        <div class="dashboard-head">
          <div>
            <p class="eyebrow">Back Office</p>
            <h1>Customer accounts</h1>
          </div>
          <div class="dashboard-head__actions">
            <select class="admin-search admin-filter" id="adminStatusFilter" aria-label="Filter accounts by status">
              <option value="">All statuses</option>
              <option value="Pending Approval">Pending Approval</option>
              <option value="Active">Active</option>
              <option value="Frozen">Frozen</option>
              <option value="Rejected">Rejected</option>
            </select>
            <input class="admin-search" id="adminSearch" placeholder="Search by name or email">
            <button class="text-button" id="adminRefreshButton" type="button">Refresh</button>
          </div>
        </div>
        <section class="dashboard-metrics" id="adminMetrics"></section>
        <section class="admin-grid">
          <article class="admin-panel">
            <h2>Accounts</h2>
            <div class="admin-table" id="adminUsers"></div>
          </article>
          <article class="admin-panel">
            <h2>Recent transactions</h2>
            <div class="admin-table" id="adminTransactions"></div>
          </article>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
